services:
  - type: web
    name: attendease
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python start.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: attendease-db
          property: connectionString

databases:
  - name: attendease-db
    plan: free
